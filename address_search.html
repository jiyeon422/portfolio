<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE-Edge"/>
	<link rel="stylesheet" href="./css/style.css"/>
	<link rel="stylesheet" href="./css/bootstrap.min.css"/>
	<link rel="stylesheet" href="./scss/card.scss" />
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
	

	<title>팝업_주소검색</title>
</head>
<body>

<div id="pop_wrap">
	<div class="pop_frame pop_address_search">
		<div class="pop_top">
			<span>주소검색</span>
			<div class="pop_logo"></div>
		</div>

		<div class="pop_content">
			<div class="pop_search">
				<nav class="navbar navbar-light bg-light">
					<div class="container-fluid">
					<form class="d-flex">
						<input class="form-control me-2" type="search" placeholder="검색어를 입력하세요" aria-label="Search">
						<button class="btn btn-outline-success btn_search" type="submit">주소검색
							<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
								<path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
							</svg>
						</button>
					</form>
					</div>
				</nav>
			</div>

			<div class="pop_notice">
				<h5 class="fw-bold">주소 검색하기</h5>
				<p>&#183; 도로명 + 건물번호<span>&nbsp;&nbsp;예&#41; 은행로 11, 강남대로 422</span></p>
				<p>&#183; 지역명(동/리) + 번지<span>&nbsp;&nbsp;예&#41; 여의도동 15-15, 역삼동 816</span></p>
				<p>&#183; 지역명(동/리) + 건물명(아파트명)<span>&nbsp;&nbsp;예&#41; 여의도동 일심빌딩, 하얀동 주공</span></p>
				<p>&#183; 사서함명 + 번호<span>&nbsp;&nbsp;예&#41; 영등포우체국사서함 59</span></p>
			</div>

			<div class="btn_cover">
				<button type="button" class="btn btn-outline-secondary btn_cancel">취소</button>
			</div>
		</div>
	</div>	
</div>

</body>
</html>
