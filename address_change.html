
<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE-Edge"/>
	<link rel="stylesheet" href="./css/style.css"/>
	<link rel="stylesheet" href="./css/bootstrap.min.css"/>
	<link rel="stylesheet" href="./scss/card.scss" />
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
	

	<title>팝업_배송지변경</title>
</head>
<body>

<div id="pop_wrap">
	<div class="pop_frame pop_address_change">
		<div class="pop_top">
			<span>배송지 변경</span>
			<div class="pop_logo"></div>
		</div>
		<div class="pop_content">
			<div class="pop_list">
				<ul class="list-group list-group-horizontal">
					<li class="list-group-item list_title">수취인 이름</li>
					<li class="list-group-item">
						<div class="col-sm col_name">
							<input type="text" class="form-control" placeholder="" aria-label="name">
						</div>
					</li>
				</ul>

				<!------------------------------ 배송지_휴대폰 번호 ------------------------------->

				<ul class="list-group list-group-horizontal">
					<li class="list-group-item list_title">휴대폰 번호</li>
					<li class="list-group-item">
						<div class="input-group">						
							<select class="form-select" aria-label="Default select example">
								<option selected>선택</option>
								<option value="1">010</option>
								<option value="2">011</option>
								<option value="3">017</option>
							</select>
							<span class="hyphen"></span>
							<div class="col-sm">
								<input type="text" class="form-control" placeholder="" aria-label="number">
							</div>
							<span class="hyphen"></span>
							<div class="col-sm">
								<input type="text" class="form-control" placeholder="" aria-label="number">
							</div>
						</div>			
					</li>
				</ul>

				<!------------------------------ 배송지 변경_전화번호 ------------------------------->

				<ul class="list-group list-group-horizontal">
					<li class="list-group-item list_title">전화번호</li>
					<li class="list-group-item">
						<div class="input-group">						
							<select class="form-select" aria-label="Default select example">
								<option selected>선택</option>
								<option value="1">070</option>
								<option value="2">02</option>
								<option value="3">031</option>
								<option value="3">032</option>
								<option value="3">033</option>
							</select>
							<span class="hyphen"></span>
							<div class="col-sm">
								<input type="text" class="form-control" placeholder="" aria-label="number">
							</div>
							<span class="hyphen"></span>
							<div class="col-sm">
								<input type="text" class="form-control" placeholder="" aria-label="number">
							</div>
						</div>			
					</li>
				</ul>

				<!------------------------------ 배송지 변경_주소 ------------------------------->
				
				<ul class="list-group list-group-horizontal-sm">
					<li class="list-group-item list_title">주소</li>
					<li class="list-group-item">
						<div class="address_total address_first">
							<p>&#183; 우편번호 :</p>
							<div class="col-sm col_code">
								<input type="text" class="form-control" placeholder="" aria-label="number">								
							</div>
							<button type="button" class="btn btn-outline-primary">주소 검색</button>
							<span class="ipt">[주소 검색] 버튼을 클릭하여 주소를 검색하세요</span>							
						</div>	
						<div class="address_total address_second">			
							<p>&#183; 도로명 주소 :</p>
							<div class="col-sm col_address1">
								<input type="text" class="form-control" placeholder="" aria-label="address">
							</div>				
						</div>
						<div class="address_total address_third">
							<p>&#183; 지번 주소 :</p>
							<div class="col-sm col_address2">
								<input type="text" class="form-control" placeholder="" aria-label="address">
							</div>							
						</div>						
						</ul>
					</li>
				</ul>			
			</div>
			<div class="btn_cover">
				<button type="button" class="btn btn-outline-secondary btn_cancel">취소</button>
				<button type="button" class="btn btn-primary btn_save">저장</button>
			</div>
		</div>
	</div>	
</div>

</body>
</html>
