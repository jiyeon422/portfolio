<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE-Edge"/>
	<link rel="stylesheet" href="./css/style.css"/>
	<link rel="stylesheet" href="./css/bootstrap.min.css"/>
	<link rel="stylesheet" href="./scss/card.scss" />
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

	<title>팝업_도서검색</title>
    <style>
        .product_search {text-align: center; font-size: 13px;}
        .pop_product {border-top: 1px solid #555555;}
        .product_top { font-size: 14px; color: #555555;}
    </style>
</head>
<body>
<!--전체-->
<div id="pop_wrap">
	<div class="pop_frame pop_book_search">

		<!--상단-->
		<div class="pop_top">
			<span>도서검색</span>
			<div class="pop_logo"></div>
		</div>

		<!--전체적-->
		<div class="pop_content">
			<div class="pop_search">
				<nav class="navbar navbar-light bg-light">
					<div class="container-fluid">

							<!--내부-->
						<div class="check_option">
							<div class="date">
								<span class="product_top">출판일</span>
								<div class="btn-group" role="group" aria-label="Basic outlined example">
									<button type="button" class="btn btn-outline-secondary">오늘</button>
									<button type="button" class="btn btn-outline-secondary">이번달</button>
									<button type="button" class="btn btn-outline-secondary">1개월</button>
									<button type="button" class="btn btn-outline-secondary">3개월</button>
								</div>
							</div>
							<div class="search">
								<span class="product_top">검색</span>
								<div class="dropdown">
									<button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false">
									도서제목
									</button>
							</div>
							<nav class="navbar navbar-light bg-light">
								<div class="container-fluid">
									<form class="d-flex">
										<input class="form-control me-2" type="search" placeholder="검색어를 입력하세요" aria-label="Search">
										<button class="btn btn-outline-success" type="submit">검색
											<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
												<path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"></path>
											</svg>
										</button>
									</form>
								</div>
							</nav>
						</div>

					</div>					
				</nav>
			</div>

			<!--상품검색하기-->
            <br><br>
			<div class="pop_product">
                <br><br>
                <p class="product_search">상품을 검색 해주세요</p>
                <br>
			</div>

			<!--하단버튼-->
			<div class="btn_cover">
				<button type="button" class="btn btn-outline-secondary btn_cancel">취소</button>
				<button type="button" class="btn btn-primary btn_save">적용</button>
			</div>
		</div>
	</div>	
</div>

</body>
</html>
